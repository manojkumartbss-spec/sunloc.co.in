function updateBoxCalc() {
  const size = document.getElementById('fd-size')?.value;
  const qty = parseFloat(document.getElementById('fd-qty')?.value)||0;
  const packSize = state.packSizes[size]||100000;
  const boxes = Math.ceil(qty*100000/packSize);
  const el = document.getElementById('fd-boxes');
  if (el) el.value = boxes||'';
}

function saveDispatchModal(existingId) {
  const size = document.getElementById('fd-size')?.value;
  const qty = parseFloat(document.getElementById('fd-qty')?.value)||0;
  const packSize = state.packSizes[size]||100000;
  const boxes = Math.ceil(qty*100000/packSize);
  const existing = existingId ? state.dispatchPlans.find(d=>d.id===existingId) : null;
  const newDate = document.getElementById('fd-date')?.value;
  const oldDate = existing?.plannedDate ? toDateInput(existing.plannedDate) : null;
  const dateChanged = existingId && oldDate && newDate && newDate !== oldDate;
  const dp = {
    id: existingId||uid(),
    productionOrderId: existingId ? existing?.productionOrderId : null,
    customer: document.getElementById('fd-customer')?.value,
    batchNumber: document.getElementById('fd-batch')?.value,
    pcCode: document.getElementById('fd-pccode')?.value,
    size, colour: document.getElementById('fd-colour')?.value,
    packing: document.getElementById('fd-packing')?.value,
    zone: document.getElementById('fd-zone')?.value,
    qty, boxes,
    plannedDate: new Date(newDate||today()),
    actualDispatched: existingId?(existing?.actualDispatched||0):0,
    status: existingId?(existing?.status||'pending'):'pending',
    remarks: document.getElementById('fd-remarks')?.value,
    tentative: existingId ? (dateChanged ? false : (existing?.tentative||false)) : false,
    dateManuallySet: existingId ? (dateChanged ? true : (existing?.dateManuallySet||false)) : false,
  };
  if (existingId) { const idx=state.dispatchPlans.findIndex(d=>d.id===existingId); if(idx>=0) state.dispatchPlans[idx]=dp; }
  else state.dispatchPlans.push(dp);
  saveState(); closeModal(); render();
}

function editDispatch(id) { showAddDispatchModal(id); }

// ── Export menu toggle ─────────────────────────────────────────
function toggleExportMenu() {
  const m = document.getElementById('export-menu');
  if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      const wrap = document.getElementById('export-wrap');
      if (wrap && !wrap.contains(e.target)) {
        if (m) m.style.display = 'none';
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

// ── Helper: dispatch row to export object ─────────────────────
function dispatchRowObj(p) {
  return {
    'Customer': p.customer || '',
    'Batch No': p.batchNumber || '',
    'PC Code': p.pcCode || '',
    'Colour': p.colour || '',
    'Size': p.size || '',
    'PTD/UP': p.packing || '',
    'Zone': p.zone || '',
    'Qty (Lakhs)': fmt(p.qty),
    'Boxes': p.boxes || '',
    'Planned Dispatch Date': p.plannedDate ? fmtDate(p.plannedDate) : 'Pending',
    'Date Status': p.dateManuallySet ? 'Manual' : (p.tentative ? 'Tentative' : 'Confirmed'),
    'Dispatched (Lakhs)': fmt(p.actualDispatched || 0),
    'Balance (Lakhs)': fmt((p.qty || 0) - (p.actualDispatched || 0)),
    'Status': p.status || '',
    'Remarks': p.remarks || ''
  };
}

// 1. FULL DISPATCH PLAN (existing — updated with tentative col)
function exportDispatchPlan() {
  const rows = state.dispatchPlans
    .sort((a,b) => new Date(a.plannedDate) - new Date(b.plannedDate))
    .map(p => dispatchRowObj(p));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Dispatch Plan');
  XLSX.writeFile(wb, `Sunloc_Dispatch_Plan_${new Date().toISOString().slice(0,10)}.xlsx`);
  if (document.getElementById('export-menu')) document.getElementById('export-menu').style.display = 'none';
}

// 2. CUSTOMER-WISE — separate Excel file per customer
function exportCustomerWise() {
  if (document.getElementById('export-menu')) document.getElementById('export-menu').style.display = 'none';
  const customers = [...new Set(state.dispatchPlans.map(p => p.customer).filter(Boolean))].sort();
  if (customers.length === 0) { alert('No dispatch plans found.'); return; }

  let exported = 0;
  customers.forEach(cust => {
    const plans = state.dispatchPlans
      .filter(p => p.customer === cust)
      .sort((a,b) => new Date(a.plannedDate) - new Date(b.plannedDate));
    if (plans.length === 0) return;

    const rows = plans.map(p => dispatchRowObj(p));

    // Summary row at bottom
    const totalQty = plans.reduce((s,p) => s + (p.qty||0), 0);
    const totalBoxes = plans.reduce((s,p) => s + (p.boxes||0), 0);
    const totalDispatched = plans.reduce((s,p) => s + (p.actualDispatched||0), 0);
    rows.push({
      'Customer': 'TOTAL', 'Batch No': '', 'PC Code': '', 'Colour': '', 'Size': '', 'PTD/UP': '',
      'Zone': '', 'Qty (Lakhs)': fmt(totalQty), 'Boxes': totalBoxes,
      'Planned Dispatch Date': '', 'Date Status': '',
      'Dispatched (Lakhs)': fmt(totalDispatched),
      'Balance (Lakhs)': fmt(totalQty - totalDispatched),
      'Status': `${plans.filter(p=>p.status==='dispatched').length}/${plans.length} dispatched`,
      'Remarks': ''
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(rows);
    // Column widths
    ws['!cols'] = [18,14,10,14,8,8,14,12,8,20,12,16,14,12,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws, 'Dispatch Plan');
    XLSX.writeFile(wb, `Sunloc_${cust.replace(/[^a-zA-Z0-9]/g,'_')}_Dispatch_${new Date().toISOString().slice(0,10)}.xlsx`);
    exported++;
  });
  setTimeout(() => alert(`${exported} customer file(s) downloaded.`), 300);
}

// 3. ZONE-WISE — one file, one sheet per zone
function exportZoneWise() {
  if (document.getElementById('export-menu')) document.getElementById('export-menu').style.display = 'none';
  const zones = [...new Set(state.dispatchPlans.map(p => p.zone).filter(Boolean))].sort();
  if (zones.length === 0) { alert('No dispatch plans found.'); return; }

  const wb = XLSX.utils.book_new();
  zones.forEach(zone => {
    const plans = state.dispatchPlans
      .filter(p => p.zone === zone)
      .sort((a,b) => new Date(a.plannedDate) - new Date(b.plannedDate));
    if (plans.length === 0) return;

    const rows = plans.map(p => dispatchRowObj(p));

    // Zone summary row
    const totalQty = plans.reduce((s,p) => s + (p.qty||0), 0);
    const totalBoxes = plans.reduce((s,p) => s + (p.boxes||0), 0);
    const totalDispatched = plans.reduce((s,p) => s + (p.actualDispatched||0), 0);
    rows.push({
      'Customer': 'ZONE TOTAL', 'Batch No': '', 'PC Code': '', 'Colour': '', 'Size': '', 'PTD/UP': '',
      'Zone': zone, 'Qty (Lakhs)': fmt(totalQty), 'Boxes': totalBoxes,
      'Planned Dispatch Date': '', 'Date Status': '',
      'Dispatched (Lakhs)': fmt(totalDispatched),
      'Balance (Lakhs)': fmt(totalQty - totalDispatched),
      'Status': `${plans.filter(p=>p.status==='dispatched').length}/${plans.length} dispatched`,
      'Remarks': ''
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [18,14,10,14,8,8,14,12,8,20,12,16,14,12,20].map(w=>({wch:w}));
    const sheetName = zone.slice(0,31).replace(/[:\\/?*\[\]]/g,'_');
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  // Summary sheet — one row per zone
  const summaryRows = zones.map(zone => {
    const plans = state.dispatchPlans.filter(p => p.zone === zone);
    const totalQty = plans.reduce((s,p) => s + (p.qty||0), 0);
    const totalDispatched = plans.reduce((s,p) => s + (p.actualDispatched||0), 0);
    const nextDispatch = plans.filter(p=>p.status!=='dispatched' && p.plannedDate)
      .sort((a,b)=>new Date(a.plannedDate)-new Date(b.plannedDate))[0];
    return {
      'Zone': zone,
      'Total Orders': plans.length,
      'Dispatched Orders': plans.filter(p=>p.status==='dispatched').length,
      'Pending Orders': plans.filter(p=>p.status!=='dispatched').length,
      'Total Qty (L)': fmt(totalQty),
      'Dispatched (L)': fmt(totalDispatched),
      'Balance (L)': fmt(totalQty - totalDispatched),
      'Next Dispatch Date': nextDispatch ? fmtDate(nextDispatch.plannedDate) : '-',
      'Next Dispatch Status': nextDispatch ? (nextDispatch.tentative ? 'Tentative' : 'Confirmed') : '-'
    };
  });
  const summaryWs = XLSX.utils.json_to_sheet(summaryRows);
  summaryWs['!cols'] = [16,14,16,14,14,14,14,20,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, summaryWs, 'Zone Summary');

  XLSX.writeFile(wb, `Sunloc_Zone_Dispatch_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// 4. PENDING DISPATCH SUMMARY — only undispatched orders
function exportPendingDispatch() {
  if (document.getElementById('export-menu')) document.getElementById('export-menu').style.display = 'none';
  const pending = state.dispatchPlans
    .filter(p => p.status !== 'dispatched')
    .sort((a,b) => new Date(a.plannedDate) - new Date(b.plannedDate));

  if (pending.length === 0) { alert('No pending dispatch orders found.'); return; }

  const rows = pending.map(p => ({
    ...dispatchRowObj(p),
    'Days to Dispatch': p.plannedDate ? Math.ceil((new Date(p.plannedDate) - new Date()) / 86400000) : '-'
  }));

  // Group summary by zone
  const zoneSummary = {};
  pending.forEach(p => {
    const z = p.zone || 'Unassigned';
    if (!zoneSummary[z]) zoneSummary[z] = { count: 0, qty: 0 };
    zoneSummary[z].count++;
    zoneSummary[z].qty += (p.qty || 0);
  });
  const summaryRows = Object.entries(zoneSummary)
    .sort((a,b) => b[1].qty - a[1].qty)
    .map(([zone, d]) => ({ 'Zone': zone, 'Pending Orders': d.count, 'Pending Qty (L)': fmt(d.qty) }));

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [18,14,10,14,8,8,14,12,8,20,12,16,14,12,20,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, 'Pending Dispatch');

  const summaryWs = XLSX.utils.json_to_sheet(summaryRows);
  summaryWs['!cols'] = [16,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, summaryWs, 'Zone Summary');

  XLSX.writeFile(wb, `Sunloc_Pending_Dispatch_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// 5. FULL ORDER TRACKER — production + dispatch combined
function exportFullOrderTracker() {
  if (document.getElementById('export-menu')) document.getElementById('export-menu').style.display = 'none';
  const rows = state.orders
    .filter(o => !o.deleted)
    .sort((a,b) => new Date(a.startDate) - new Date(b.startDate))
    .map(ord => {
      const dp = state.dispatchPlans.find(d => d.productionOrderId === ord.id);
      const po = state.printOrders.find(p => p.productionOrderId === ord.id);
      return {
        // Production
        'Machine': ord.machineId || '',
        'Batch No': ord.batchNumber || '',
        'Customer': ord.customer || '',
        'PO Number': ord.poNumber || '',
        'PC Code': ord.pcCode || '',
        'Size': ord.size || '',
        'Colour': ord.colour || '',
        'PTD/UP': ord.isPrinted ? 'PTD' : 'UP',
        'Zone': ord.zone || '',
        'Order Qty (L)': fmt(ord.qty),
        'Gross Qty (L)': fmt(ord.grossQty),
        'Prod Start': fmtDate(ord.startDate),
        'Prod End (Expected)': fmtDate(ord.endDate),
        'Actual Prod (L)': fmt(ord.actualProd || 0),
        'Prod Status': ord.status || '',
        // Printing
        'Print OPM': po ? (po.machineId || '') : '-',
        'Printed to Date (L)': po ? fmt(po.printedToDate || 0) : '-',
        'Print Status': po ? (po.status || '') : '-',
        // Dispatch
        'Planned Dispatch Date': dp ? (dp.plannedDate ? fmtDate(dp.plannedDate) : 'Pending') : '-',
        'Dispatch Date Status': dp ? (dp.dateManuallySet ? 'Manual' : (dp.tentative ? 'Tentative' : 'Confirmed')) : '-',
        'Dispatched (L)': dp ? fmt(dp.actualDispatched || 0) : '-',
        'Dispatch Status': dp ? (dp.status || '') : '-',
        'Remarks': ord.remarks || ''
      };
    });

  if (rows.length === 0) { alert('No orders found.'); return; }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [10,12,18,14,10,8,14,8,14,12,12,14,16,14,12,10,14,12,20,14,14,14,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, 'Order Tracker');

  // Second sheet: summary by customer
  const custMap = {};
  state.orders.filter(o=>!o.deleted).forEach(ord => {
    const c = ord.customer || 'Unknown';
    if (!custMap[c]) custMap[c] = { orders:0, totalQty:0, produced:0, dispatched:0 };
    custMap[c].orders++;
    custMap[c].totalQty += (ord.qty || 0);
    custMap[c].produced += (ord.actualProd || 0);
    const dp = state.dispatchPlans.find(d => d.productionOrderId === ord.id);
    if (dp) custMap[c].dispatched += (dp.actualDispatched || 0);
  });
  const custRows = Object.entries(custMap)
    .sort((a,b) => b[1].totalQty - a[1].totalQty)
    .map(([cust, d]) => ({
      'Customer': cust, 'Total Orders': d.orders,
      'Order Qty (L)': fmt(d.totalQty), 'Produced (L)': fmt(d.produced),
      'Dispatched (L)': fmt(d.dispatched), 'Balance (L)': fmt(d.totalQty - d.dispatched)
    }));
  const custWs = XLSX.utils.json_to_sheet(custRows);
  custWs['!cols'] = [20,14,14,14,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, custWs, 'Customer Summary');

  XLSX.writeFile(wb, `Sunloc_Order_Tracker_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// =============================
function renderDispatchCalendar() {
  const topActions = document.getElementById('topbar-actions');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  topActions.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="calendarNav(-1)">◀ Prev</button>
    <span style="font-family:var(--mono);font-size:13px;color:var(--text)">${now.toLocaleString('en-IN',{month:'long',year:'numeric'})}</span>
    <button class="btn btn-ghost btn-sm" onclick="calendarNav(1)">Next ▶</button>
  `;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  // Map dispatch plans to dates
  const dispatchByDate = {};
  for (const dp of state.dispatchPlans) {
    if (!dp.plannedDate) continue;
    const d = new Date(dp.plannedDate);
    if (d.getMonth()===month && d.getFullYear()===year) {
      const key = d.getDate();
      if (!dispatchByDate[key]) dispatchByDate[key]=[];
      dispatchByDate[key].push(dp);
    }
  }

  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let html = `
    <div class="card">
      <div class="card-title">Truck Dispatch Calendar</div>
      <div class="cal-grid" style="margin-bottom:8px">
        ${days.map(d=>`<div class="cal-header">${d}</div>`).join('')}
      </div>
      <div class="cal-grid" id="cal-days">
        ${Array(firstDay).fill('<div></div>').join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day = i+1;
          const isToday = day===now.getDate();
          const plans = dispatchByDate[day]||[];
          const zones = [...new Set(plans.map(p=>p.zone||''))];
          const readyZones = zones.filter(z=>{
            const zBoxes = plans.filter(p=>p.zone===z).reduce((s,p)=>s+(p.boxes||0),0);
            return zBoxes >= TRUCK_CAPACITY;
          });
          const hasTrucks = readyZones.length>0;
          const colors = ['','blue','green','purple'];
          return `<div class="cal-day ${isToday?'today':''} ${hasTrucks?'has-trucks':''}" onclick="showDayDispatch(${day},${month},${year})">
            <div class="cal-day-num">${day}</div>
            ${zones.slice(0,3).map((z,zi)=>`<div class="cal-chip ${colors[zi]||''}">${z.slice(0,6)}</div>`).join('')}
            ${readyZones.length>0?`<div class="cal-chip green">✓ ${readyZones.length} truck${readyZones.length>1?'s':''}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div id="cal-day-detail"></div>
  `;
  document.getElementById('content').innerHTML = html;
}

function calendarNav(dir) {
  // Simple month nav - re-render with offset
  navigate('dispatch-calendar');
}

function showDayDispatch(day, month, year) {
  const date = new Date(year, month, day);
  const plans = state.dispatchPlans.filter(dp=>{
    if (!dp.plannedDate) return false;
    const d = new Date(dp.plannedDate);
    return d.getDate()===day && d.getMonth()===month && d.getFullYear()===year;
  });
  if (plans.length===0) return;

  const zones = [...new Set(plans.map(p=>p.zone))];
  const det = document.getElementById('cal-day-detail');
  det.innerHTML = `
    <div class="card mt-4">
      <div class="card-title">📅 ${fmtDate(date)} — Dispatch Details</div>
      ${zones.map(z=>{
        const zp = plans.filter(p=>p.zone===z);
        const totalBoxes = zp.reduce((s,p)=>s+(p.boxes||0),0);
        const isReady = totalBoxes>=TRUCK_CAPACITY;
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span class="text-mono fw-bold text-accent">${z}</span>

            <div class="table-wrap">
              <table>
                <thead><tr><th>Customer</th><th>Batch</th><th>PC Code</th><th>Size</th><th>PTD/UP</th><th>Qty (L)</th><th>Boxes</th><th>Status</th></tr></thead>

                  <td>${p.size}</td><td>${p.packing}</td><td class="text-mono">${fmt(p.qty)}</td><td class="text-mono">${p.boxes}</td>

              </table>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// =============================
// MONTHLY ARCHIVE SYSTEM
// =============================

// ── Helper: get month label ───────────────────────────────────
function monthLabel(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-');
  return new Date(y, parseInt(m)-1, 1).toLocaleString('default', {month:'long', year:'numeric'});
}

function currentYM() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

// ── On load: set activeMonth if not set, check for auto-prompt ─
function initMonthlyArchive() {
  if (!state.activeMonth) {
    state.activeMonth = currentYM();
    saveState();
  }
  checkMonthRollover();
}

// ── Check if it's the 1st of a new month and prompt planner ───
function checkMonthRollover() {
  const now = new Date();
  const ym = currentYM();
  if (ym === state.activeMonth) return; // same month — no action needed

  // New month detected — check if already prompted today
  const promptKey = `sunloc_archive_prompt_${ym}`;
  if (localStorage.getItem(promptKey)) return; // already prompted this month
  localStorage.setItem(promptKey, '1');

  // Show prompt after slight delay so app renders first
  setTimeout(() => showMonthRolloverPrompt(state.activeMonth, ym), 1200);
}

function showMonthRolloverPrompt(oldYM, newYM) {
  const spansCount = state.orders.filter(o =>
    !o.deleted && o.status !== 'closed' &&
    o.startDate && new Date(o.startDate) <= new Date(new Date().getFullYear(), new Date().getMonth(), 0) &&
    o.endDate && new Date(o.endDate) >= new Date(new Date().getFullYear(), new Date().getMonth(), 1)
  ).length;

  openModal(`📅 New Month — Archive ${monthLabel(oldYM)}?`, `
    <div class="alert alert-info" style="margin-bottom:16px">
      A new month has started (<strong>${monthLabel(newYM)}</strong>).<br>
      Would you like to archive <strong>${monthLabel(oldYM)}</strong> and open a fresh plan for ${monthLabel(newYM)}?
    </div>
    <div style="margin-bottom:12px;font-size:13px;color:var(--text-muted)">
      <strong>What will happen:</strong>
      <ul style="margin-top:6px;padding-left:18px;line-height:1.8">
        <li>${monthLabel(oldYM)} data will be saved to Archives (view + export anytime)</li>
        <li>Fresh planning sheets open for ${monthLabel(newYM)}</li>
        <li><strong>${spansCount} order(s)</strong> that span both months will appear in both</li>
        <li>Archives are editable for 7 days after closure, then read-only</li>
      </ul>
    </div>
    <div style="font-size:12px;color:var(--accent4)">
      ⚠️ You can also do this manually anytime from Settings → Monthly Archive.
    </div>
  `, [
    {label:`Archive ${monthLabel(oldYM)} & Open ${monthLabel(newYM)}`, cls:'btn-primary', fn:'closeMonthAndArchive()'},
    {label:'Remind Me Later', cls:'btn-secondary', fn:'closeModal()'},
  ]);
}

// ── Core: archive current month and roll to new month ─────────
function closeMonthAndArchive() {
  const oldYM = state.activeMonth;
  const newYM = currentYM();
  closeModal();

  // Snapshot current plan for archive
  const snapshot = {
    month: oldYM,
    closedAt: new Date().toISOString(),
    data: {
      orders:        JSON.parse(JSON.stringify(state.orders.filter(o => !o.deleted))),
      printOrders:   JSON.parse(JSON.stringify(state.printOrders)),
      dispatchPlans: JSON.parse(JSON.stringify(state.dispatchPlans)),
      dailyPrinting: JSON.parse(JSON.stringify(state.dailyPrinting)),
    }
  };

  // Add to archives (keep last 24 months)
  state.archives = state.archives || [];
  state.archives = state.archives.filter(a => a.month !== oldYM); // replace if re-archiving
  state.archives.unshift(snapshot);
  if (state.archives.length > 24) state.archives = state.archives.slice(0, 24);

  // Carry-forward: keep orders/print/dispatch that span into new month OR are unclosed
  const newMonthStart = new Date(parseInt(newYM.split('-')[0]), parseInt(newYM.split('-')[1])-1, 1);

  // Orders to carry forward: not deleted AND (unclosed OR end date is in new month or beyond)
  state.orders = state.orders.filter(o => {
    if (o.deleted) return false;
    if (o.status !== 'closed') return true; // unclosed always carries forward
    const endDate = o.endDate ? new Date(o.endDate) : null;
    return endDate && endDate >= newMonthStart; // spans into new month
  });

  // Print orders: carry forward if linked order carried forward OR uncompleted
  const carriedOrderIds = new Set(state.orders.map(o => o.id));
  state.printOrders = state.printOrders.filter(p =>
    p.status !== 'completed' || carriedOrderIds.has(p.productionOrderId)
  );

  // Dispatch plans: carry forward if not dispatched
  state.dispatchPlans = state.dispatchPlans.filter(p => p.status !== 'dispatched');

  // Daily printing logs: keep only current month onwards
  state.dailyPrinting = state.dailyPrinting.filter(l => {
    const d = l.date ? new Date(l.date) : null;
    return d && d >= newMonthStart;
  });

  state.activeMonth = newYM;
  saveState();

  // Show success
  openModal('✅ Archive Complete', `
    <div class="alert" style="background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);margin-bottom:12px">
      <strong>${monthLabel(oldYM)}</strong> has been archived successfully.
    </div>
    <div style="font-size:13px;line-height:1.8;color:var(--text-muted)">
      <strong>${state.orders.length}</strong> order(s) carried forward to ${monthLabel(newYM)}<br>
      View archived data anytime under <strong>Archives</strong> in the sidebar.
    </div>
  `, [{label:'OK', cls:'btn-primary', fn:'closeModal();render()'}]);
}

// ── Check if an archive is within 7-day edit window ──────────
function isArchiveEditable(archive) {
  const closedAt = new Date(archive.closedAt);
  const now = new Date();
  return (now - closedAt) < (7 * 24 * 60 * 60 * 1000);
}

// ── Export an archived month to Excel ─────────────────────────
function exportArchive(ym) {
  const arch = (state.archives||[]).find(a => a.month === ym);
  if (!arch) return;
  const orders = arch.data.orders || [];
  const dispatch = arch.data.dispatchPlans || [];
  const printing = arch.data.printOrders || [];

  const wb = XLSX.utils.book_new();

  // Sheet 1: Orders
  const orderRows = orders.map(ord => {
    const dp = dispatch.find(d => d.productionOrderId === ord.id);
    return {
      'Machine': ord.machineId, 'Batch No': ord.batchNumber, 'Customer': ord.customer,
      'PC Code': ord.pcCode, 'Size': ord.size, 'PTD/UP': ord.isPrinted?'PTD':'UP',
      'Zone': ord.zone, 'Order Qty (L)': fmt(ord.qty),
      'Start Date': fmtDate(ord.startDate), 'End Date': fmtDate(ord.endDate),
      'Actual Prod (L)': fmt(ord.actualProd||0), 'Prod Status': ord.status,
      'Planned Dispatch': dp&&dp.plannedDate?fmtDate(dp.plannedDate):'-',
      'Dispatched (L)': dp?fmt(dp.actualDispatched||0):'-',
      'Dispatch Status': dp?dp.status:'-'
    };
  });
  const ws1 = XLSX.utils.json_to_sheet(orderRows.length ? orderRows : [{'Note':'No orders'}]);
  ws1['!cols'] = [10,14,18,10,8,8,14,12,14,14,14,12,16,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Production Plan');

  // Sheet 2: Dispatch
  const dispRows = dispatch.map(p => ({
    'Customer': p.customer, 'Batch No': p.batchNumber, 'PC Code': p.pcCode,
    'Size': p.size, 'Zone': p.zone, 'Qty (L)': fmt(p.qty), 'Boxes': p.boxes,
    'Planned Date': p.plannedDate?fmtDate(p.plannedDate):'Pending',
    'Dispatched (L)': fmt(p.actualDispatched||0), 'Status': p.status
  }));
  const ws2 = XLSX.utils.json_to_sheet(dispRows.length ? dispRows : [{'Note':'No dispatch records'}]);
  XLSX.utils.book_append_sheet(wb, ws2, 'Dispatch Plan');

  // Sheet 3: Print Plan
  const printRows = printing.map(p => ({
    'OPM': p.machineId, 'Batch No': p.batchNumber, 'PC Code': p.pcCode,
    'Qty to Print (L)': fmt(p.qtyToPrint), 'Printed to Date (L)': fmt(p.printedToDate||0),
    'Start': fmtDate(p.startDate), 'End': fmtDate(p.endDate), 'Status': p.status
  }));
  const ws3 = XLSX.utils.json_to_sheet(printRows.length ? printRows : [{'Note':'No print records'}]);
  XLSX.utils.book_append_sheet(wb, ws3, 'Print Plan');

  XLSX.writeFile(wb, `Sunloc_Archive_${ym}_${monthLabel(ym).replace(' ','_')}.xlsx`);
  closeModal();
}

// ── Re-archive: planner can refresh archive within 7-day window
function reArchiveMonth(ym) {
  if (!confirm(`Re-archive ${monthLabel(ym)}? This will overwrite the existing archive with current data.`)) return;
  // Temporarily swap state to re-trigger archive
  const oldMonth = state.activeMonth;
  state.activeMonth = ym;
  closeMonthAndArchive();
  state.activeMonth = oldMonth;
  saveState();
}

// MACHINE MASTER PAGE
// =============================
function renderTrackingStage(ord) {
  const stages = ord.stageStatus;
  if (!stages) return '<span style="color:var(--text-muted);font-size:11px">-</span>';
  if (ord.trackingStatus === 'ready_to_invoice') return '<span class="badge badge-completed">✅ Ready to Invoice</span>';
  const flow = ord.isPrinted
    ? ['production','aim','printing','pi','packing','dispatch']
    : ['production','aim','packing','dispatch'];
  const stageLabels = {production:'Prod',aim:'AIM',printing:'Print',pi:'PI',packing:'Packing',dispatch:'Dispatch'};
  let currentStage = 'production';
  for (const s of flow) { if (stages[s] === 'closed') currentStage = s; else break; }
  const idx = flow.indexOf(currentStage);
  const nextStage = idx < flow.length-1 ? flow[idx+1] : null;
  const display = nextStage ? stageLabels[nextStage] : stageLabels[currentStage];
  const color = currentStage==='dispatch'?'badge-completed':currentStage==='packing'?'badge-running':'badge-pending';
  const alerts = ord.trackingAlerts || 0;
  return `<span class="badge ${color}">${display}</span>${alerts>0?' <span style="color:#f44336;font-size:10px;font-weight:700">🚩'+alerts+'</span>':''}`;
}

function showAddMachineModal(existingId) {
  const ex = existingId ? state.machineMaster.find(m=>m.id===existingId) : null;
  openModal(ex?'Edit Machine':'Add Machine', `
    <div class="form-grid">
      <div class="form-group"><label>Machine ID</label><input class="form-control" id="mc-id" value="${ex?.id||''}" placeholder="e.g. MC35" ${ex?'readonly':''}></div>
      <div class="form-group"><label>Default Size</label><select class="form-control" id="mc-size">${SIZES.map(s=>`<option value="${s}" ${ex?.size===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-group"><label>Capacity (L/day)</label><input class="form-control" id="mc-cap" type="number" value="${ex?.cap||20}"></div>
      <div class="form-group"><label>A-Grade %</label><input class="form-control" id="mc-agrade" type="number" value="${ex?.aGrade||93}"></div>
    </div>
  `, [
    {label:'Save', cls:'btn-primary', fn:`saveMachine('${existingId||''}')`},
    {label:'Cancel', cls:'btn-secondary', fn:'closeModal()'}
  ]);
}

function saveMachine(existingId) {
  const mc = {
    id: document.getElementById('mc-id')?.value,
    size: document.getElementById('mc-size')?.value,
    cap: parseFloat(document.getElementById('mc-cap')?.value)||20,
    aGrade: parseFloat(document.getElementById('mc-agrade')?.value)||93,
  };
  if (existingId) { const idx=state.machineMaster.findIndex(m=>m.id===existingId); if(idx>=0) state.machineMaster[idx]=mc; }
  else state.machineMaster.push(mc);
  saveState(); closeModal(); render();
}

function editMachine(id) { showAddMachineModal(id); }

function editPrintMachine(id) {
  const ex = state.printMachineMaster.find(m=>m.id===id);
  openModal('Edit Print Machine', `
    <div class="form-grid">
      <div class="form-group"><label>Machine ID</label><input class="form-control" value="${ex?.id||''}" readonly></div>
      <div class="form-group"><label>Size</label><input class="form-control" id="pm-size" value="${ex?.size||''}"></div>
      <div class="form-group"><label>Capacity (L/day)</label><input class="form-control" id="pm-cap" type="number" value="${ex?.cap||11}"></div>
      <div class="form-group"><label>Customer Preference</label><input class="form-control" id="pm-pref" value="${ex?.pref||''}"></div>
    </div>
  `, [
    {label:'Save', cls:'btn-primary', fn:`savePrintMachine('${id}')`},
    {label:'Cancel', cls:'btn-secondary', fn:'closeModal()'}
  ]);
}

function savePrintMachine(id) {
  const pm = state.printMachineMaster.find(m=>m.id===id);
  if (pm) {
    pm.size = document.getElementById('pm-size')?.value||pm.size;
    pm.cap = parseFloat(document.getElementById('pm-cap')?.value)||pm.cap;
    pm.pref = document.getElementById('pm-pref')?.value||pm.pref;
  }
  saveState(); closeModal(); render();
}

function renderPcCodes() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary btn-sm" onclick="showAddPcModal()">+ Add PC Code</button>`;
  const sizes = Object.keys(state.pcCodes).sort();
  let html = `
    <div class="alert alert-info mb-4">Product Code master — ${Object.values(state.pcCodes).reduce((s,a)=>s+a.length,0)} codes across ${sizes.length} sizes</div>
    <div class="tabs" id="pc-tabs">
      ${sizes.map((s,i)=>`<div class="tab ${i===0?'active':''}" onclick="switchPcTab(this,'${s}')">Size ${s}</div>`).join('')}
    </div>
  `;
  for (const sz of sizes) {
    const codes = state.pcCodes[sz]||[];
    html += `<div class="pc-panel" data-sz="${sz}" style="${sizes[0]===sz?'':'display:none'}">
      <div class="card">
        <div class="card-title">Size ${sz} — ${codes.length} codes</div>
        <div class="table-wrap" style="max-height:500px;overflow-y:auto">
          <table>
            <thead><tr><th>PC Code</th><th>Colour (Cap / Body)</th><th>Actions</th></tr></thead>
            <tbody>${codes.map(p=>`<tr>
              <td class="text-mono text-accent fw-bold">${p.c}</td>
              <td>${p.n}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deletePcCode('${sz}','${p.c}')">✕</button></td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function switchPcTab(el, sz) {
  document.querySelectorAll('#pc-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pc-panel').forEach(p=>p.style.display=p.dataset.sz===sz?'':'none');
}

function showAddPcModal() {
  openModal('Add New PC Code', `
    <div class="form-grid">
      <div class="form-group">
        <label>Size</label>
        <select class="form-control" id="pc-size">
          ${SIZES.map(s=>`<option value="${s}">Size ${s}</option>`).join('')}
          <option value="new">+ New Size</option>
        </select>
      </div>
      <div class="form-group" id="pc-newsize-group" style="display:none">
        <label>New Size Name</label>
        <input class="form-control" id="pc-newsize" placeholder="e.g. 0EL">
      </div>
      <div class="form-group">
        <label>PC Code</label>
        <input class="form-control" id="pc-code" placeholder="e.g. 2999">
      </div>
      <div class="form-group">
        <label>Cap Colour</label>
        <input class="form-control" id="pc-cap" placeholder="e.g. Blue">
      </div>
      <div class="form-group">
        <label>Body Colour</label>
        <input class="form-control" id="pc-body" placeholder="e.g. White">
      </div>
      <div class="form-group">
        <label>Pack Size (capsules/box) — if new size</label>
        <input class="form-control" id="pc-packsize" type="number" placeholder="e.g. 100000">
      </div>
    </div>
  `, [
    {label:'Add Code', cls:'btn-primary', fn:'savePcModal()'},
    {label:'Cancel', cls:'btn-secondary', fn:'closeModal()'}
  ]);
  document.getElementById('pc-size').addEventListener('change', function() {
    document.getElementById('pc-newsize-group').style.display = this.value==='new'?'':'none';
  });
}

function savePcModal() {
  let size = document.getElementById('pc-size')?.value;
  if (size==='new') size = document.getElementById('pc-newsize')?.value;
  if (!size) return alert('Please select or enter a size');
  const code = document.getElementById('pc-code')?.value;
  const cap = document.getElementById('pc-cap')?.value;
  const body = document.getElementById('pc-body')?.value;
  const colour = `${cap}/${body}`;
  if (!code || !cap || !body) return alert('Please fill all fields');
  if (!state.pcCodes[size]) {
    state.pcCodes[size] = [];
    const packSize = parseFloat(document.getElementById('pc-packsize')?.value)||100000;
    state.packSizes[size] = packSize;
  }
  state.pcCodes[size].push({c:code, n:colour});
  saveState(); closeModal(); render();
}

function deletePcCode(size, code) {
  if (!confirm('Delete this PC code?')) return;
  state.pcCodes[size] = (state.pcCodes[size]||[]).filter(p=>p.c!==code);
  saveState(); render();
}

function updatePackSize(sz, val) {
  state.packSizes[sz] = parseFloat(val)||100000;
  saveState();
}

function saveTruckCap() {
  alert('Truck capacity updated. Note: Refresh required to apply to all calculations.');
}

function exportAllData() {
  const data = JSON.stringify({orders:state.orders, printOrders:state.printOrders, dailyPrinting:state.dailyPrinting, dispatchPlans:state.dispatchPlans, machineMaster:state.machineMaster, printMachineMaster:state.printMachineMaster, packSizes:state.packSizes}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`Sunloc_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importAllData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.orders) state.orders=data.orders;
      if (data.printOrders) state.printOrders=data.printOrders;
      if (data.dailyPrinting) state.dailyPrinting=data.dailyPrinting;
      if (data.dispatchPlans) state.dispatchPlans=data.dispatchPlans;
      if (data.machineMaster) state.machineMaster=data.machineMaster;
      if (data.printMachineMaster) state.printMachineMaster=data.printMachineMaster;
      if (data.packSizes) state.packSizes=data.packSizes;
      saveState();
      alert('✓ Data imported successfully');
      render();
    } catch(err) { alert('Error importing data: '+err.message); }
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (!confirm('⚠️ This will delete ALL planning data. Are you sure?')) return;
  if (!confirm('This action cannot be undone. Confirm again to proceed.')) return;
  state.orders=[];state.printOrders=[];state.dailyPrinting=[];state.dispatchPlans=[];
  localStorage.removeItem('sunloc_state');
  alert('All data cleared');
  render();
}

function openModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = (buttons||[]).map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');
  document.getElementById('modal-overlay').style.display='flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
function closeModalOverlay(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

// =============================
loadState();
render();

setTimeout(() => SYNC.online().then(() => SYNC.updateBadge()), 800);

// Refresh tracking WIP every 3 minutes
setInterval(async()=>{try{await SYNC.loadTrackingStatus();render();}catch(e){}},180000);
