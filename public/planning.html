<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunloc Planning Suite v3.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e28;
  --surface3: #222736;
  --border: #2a2f3f;
  --accent: #f0a500;
  --accent2: #3b82f6;
  --accent3: #10b981;
  --accent4: #ef4444;
  --accent5: #8b5cf6;
  --text: #e8eaf0;
  --text2: #9aa0b8;
  --text3: #5a6080;
  --mono: 'DM Mono', monospace;
  --head: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--body); font-size:14px; }

/* LAYOUT */
#app { display:flex; height:100vh; overflow:hidden; }
#sidebar { width:220px; min-width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
#main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
#topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#content { flex:1; overflow-y:auto; padding:24px; }

/* SIDEBAR */
.sidebar-logo { padding:20px 16px 8px; }
.sidebar-logo h1 { font-family:var(--head); font-size:18px; font-weight:800; color:var(--accent); letter-spacing:-0.5px; }
.sidebar-logo p { font-size:10px; color:var(--text3); font-family:var(--mono); margin-top:2px; }
.sidebar-divider { height:1px; background:var(--border); margin:12px 16px; }
.nav-section { padding:4px 8px; font-size:10px; font-family:var(--mono); color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin:8px 0 4px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer; border-radius:6px; margin:1px 8px; color:var(--text2); font-size:13px; font-weight:500; transition:all 0.15s; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:linear-gradient(135deg, rgba(240,165,0,0.15), rgba(240,165,0,0.08)); color:var(--accent); border:1px solid rgba(240,165,0,0.2); }
.nav-item .icon { width:16px; text-align:center; font-size:14px; }
.nav-badge { margin-left:auto; background:var(--accent); color:#000; font-size:10px; font-family:var(--mono); padding:1px 6px; border-radius:10px; font-weight:600; }

/* TOPBAR */
.topbar-title { font-family:var(--head); font-size:16px; font-weight:700; }
.topbar-actions { display:flex; gap:8px; align-items:center; }
.btn { padding:7px 16px; border-radius:6px; border:none; cursor:pointer; font-family:var(--body); font-size:13px; font-weight:500; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#e09600; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--surface3); }
.btn-success { background:var(--accent3); color:#fff; }
.btn-danger { background:var(--accent4); color:#fff; }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; }
.card-title { font-family:var(--head); font-size:14px; font-weight:700; color:var(--text); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.card-title span { color:var(--accent); }

/* KPI CARDS */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:20px; }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px; position:relative; overflow:hidden; }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--kpi-color, var(--accent)); }
.kpi-label { font-size:11px; color:var(--text3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.5px; }
.kpi-value { font-family:var(--head); font-size:28px; font-weight:800; color:var(--text); margin:4px 0 2px; }
.kpi-sub { font-size:11px; color:var(--text2); }

/* TABLES */
.table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:var(--surface2); padding:10px 12px; text-align:left; font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; }
tbody td { padding:9px 12px; border-bottom:1px solid rgba(42,47,63,0.5); color:var(--text); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,0.02); }
tbody tr.closed td { opacity:0.5; }
tbody tr.closed td:first-child { text-decoration:line-through; }

/* STATUS BADGES */
.badge { padding:3px 8px; border-radius:20px; font-size:11px; font-family:var(--mono); font-weight:500; display:inline-block; }
.badge-running { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.2); }
.badge-pending { background:rgba(240,165,0,0.12); color:#f0a500; border:1px solid rgba(240,165,0,0.2); }
.badge-completed { background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
.badge-closed { background:rgba(90,96,128,0.2); color:var(--text3); border:1px solid var(--border); }
.badge-ptd { background:rgba(139,92,246,0.12); color:#a78bfa; border:1px solid rgba(139,92,246,0.2); }
.badge-up { background:rgba(16,185,129,0.1); color:#34d399; border:1px solid rgba(16,185,129,0.15); }

/* FORMS */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:12px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:11px; color:var(--text3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.5px; }
.form-control { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-family:var(--body); font-size:13px; outline:none; transition:border-color 0.15s; width:100%; }
.form-control:focus { border-color:var(--accent); }
.form-control option { background:var(--surface2); }
select.form-control { cursor:pointer; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:90%; max-width:700px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-family:var(--head); font-size:16px; font-weight:700; }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.modal-close { background:none; border:none; color:var(--text2); cursor:pointer; font-size:20px; line-height:1; }

/* TABS */
.tabs { display:flex; gap:2px; background:var(--surface2); border-radius:8px; padding:3px; margin-bottom:20px; border:1px solid var(--border); width:fit-content; }
.tab { padding:6px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); transition:all 0.15s; white-space:nowrap; }
.tab.active { background:var(--surface3); color:var(--text); }

/* PROGRESS BAR */
.progress-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; background:var(--accent); transition:width 0.3s; }
.progress-fill.blue { background:var(--accent2); }
.progress-fill.green { background:var(--accent3); }

/* ALERT */
.alert { padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.alert-warn { background:rgba(240,165,0,0.1); border:1px solid rgba(240,165,0,0.2); color:#f0a500; }
.alert-info { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:#60a5fa; }
.alert-success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#34d399; }

/* MACHINE GANTT */
.gantt-row { display:flex; align-items:center; gap:0; margin-bottom:2px; }
.gantt-label { width:80px; min-width:80px; font-family:var(--mono); font-size:11px; color:var(--text2); padding-right:8px; text-align:right; }
.gantt-track { flex:1; height:28px; background:var(--surface2); border-radius:4px; position:relative; overflow:hidden; }
.gantt-block { position:absolute; height:100%; display:flex; align-items:center; padding:0 6px; font-size:10px; font-family:var(--mono); white-space:nowrap; overflow:hidden; cursor:pointer; border-radius:3px; transition:opacity 0.15s; }
.gantt-block:hover { opacity:0.85; z-index:10; }

/* CALENDAR */
.cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
.cal-header { text-align:center; padding:6px; font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; }
.cal-day { min-height:80px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px; cursor:pointer; transition:border-color 0.15s; }
.cal-day:hover { border-color:var(--accent); }
.cal-day.today { border-color:var(--accent2); }
.cal-day.has-trucks { border-color:var(--accent3); background:rgba(16,185,129,0.05); }
.cal-day-num { font-family:var(--mono); font-size:11px; color:var(--text3); margin-bottom:4px; }
.cal-chip { background:rgba(240,165,0,0.15); color:var(--accent); font-size:9px; padding:2px 4px; border-radius:3px; margin-top:2px; font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-chip.blue { background:rgba(59,130,246,0.15); color:#60a5fa; }
.cal-chip.green { background:rgba(16,185,129,0.15); color:#34d399; }
.cal-chip.purple { background:rgba(139,92,246,0.15); color:#a78bfa; }

/* SUMMARY TABLE */
.summary-table { border-collapse:collapse; width:100%; font-size:12px; }
.summary-table th { background:var(--surface3); padding:8px 10px; font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; border:1px solid var(--border); }
.summary-table td { padding:7px 10px; border:1px solid var(--border); color:var(--text); text-align:right; }
.summary-table td:first-child { text-align:left; font-weight:500; color:var(--text); }
.summary-table tr.total-row td { background:var(--surface2); font-weight:600; color:var(--accent); }
.summary-table .highlight { color:var(--accent3); font-weight:600; }

/* MISC */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.section-title { font-family:var(--head); font-size:18px; font-weight:700; }
.tag { padding:2px 7px; border-radius:4px; font-size:11px; font-family:var(--mono); }
.separator { height:1px; background:var(--border); margin:20px 0; }
input[type="file"] { display:none; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state .icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; }
.chip-row { display:flex; flex-wrap:wrap; gap:6px; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }

.mc-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; }
.mc-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.mc-name { font-family:var(--mono); font-size:12px; font-weight:500; color:var(--accent); }
.mc-size-badge { background:var(--surface3); color:var(--text2); font-family:var(--mono); font-size:10px; padding:2px 6px; border-radius:4px; }
.mc-cap { font-size:11px; color:var(--text3); }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.mt-4 { margin-top:16px; }
.mb-4 { margin-bottom:16px; }
.flex { display:flex; }
.flex-center { display:flex; align-items:center; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.text-right { text-align:right; }
.text-mono { font-family:var(--mono); }
.text-accent { color:var(--accent); }
.text-green { color:var(--accent3); }
.text-red { color:var(--accent4); }
.text-blue { color:var(--accent2); }
.text-dim { color:var(--text3); }
.text-sm { font-size:12px; }
.fw-bold { font-weight:600; }
</style>
</head>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>SUNLOC</h1>
      <p>Planning Suite v3.0</p>
    </div>
    <div class="sidebar-divider"></div>
    <div class="nav-section">Production</div>

    <div class="nav-section">Masters</div>
    <div class="nav-item" onclick="navigate('machines')"><span class="icon">🔧</span> Machine Master</div>
    <div class="nav-item" onclick="navigate('pc-codes')"><span class="icon">🎨</span> PC Codes</div>

  <!-- MAIN -->
  <div id="main">

      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

const PACK_SIZES = {'00':75000,'0':100000,'1':125000,'2':175000,'3':225000,'0EL':100000,'4':175000,'5':175000};
const SIZES = ['00','0','0EL','1','2','3','4','5'];
const ZONES = ['BADDI','BADDI + JAMMU','BADDI+JAMMU','NORTH','SOUTH','EAST','WEST','DELHI','MUMBAI','RAJASTHAN','ALWAR','NEPAL','BANGLADESH','LOCAL','EXPORT'];
const EXPORT_ZONES = ['EXPORT','BANGLADESH','NEPAL','MUMBAI']; // export zones: dispatch only when full container/indent complete
const TRUCK_CAPACITY = 130; // boxes minimum per route

function isExportZone(zone) {
  if (!zone) return false;
  return EXPORT_ZONES.some(ez => zone.toUpperCase().includes(ez));
}

// For a given production order, get all sibling orders in the same container/indent
// Siblings share BOTH the same containerRef (if set) OR same poNumber, AND same zone
function getContainerSiblings(ord) {
  return state.orders.filter(o => {
    if (o.id === ord.id || o.deleted) return false;
    if (!isExportZone(o.zone)) return false;
    // Match by containerRef first, fall back to poNumber
    if (ord.containerRef && o.containerRef) return o.containerRef === ord.containerRef;
    if (ord.poNumber && o.poNumber) return o.poNumber === ord.poNumber;
    return false;
  });
}

// Check if all orders in a container/indent are closed; return latest T if yes, null if not
function getContainerReadyDate(ord) {
  const siblings = getContainerSiblings(ord);
  const allOrders = [ord, ...siblings];
  const allClosed = allOrders.every(o => o.status === 'closed');
  if (!allClosed) return null;
  // T = latest closedDate (or endDate) across all orders in container
  let latestT = null;
  for (const o of allOrders) {
    const t = o.closedDate ? new Date(o.closedDate) : (o.endDate ? new Date(o.endDate) : null);
    if (t && (!latestT || t > latestT)) latestT = t;
  }
  return latestT;
}

// Determine offset (T+2 UP, T+3 PTD) for a container — use T+3 if any order in container is PTD
function getContainerOffset(ord) {
  const siblings = getContainerSiblings(ord);
  const allOrders = [ord, ...siblings];
  return allOrders.some(o => o.isPrinted) ? 3 : 2;
}

// ─── SERVER SYNC ──────────────────────────────────────────────
const SYNC = (() => {
  let _url = localStorage.getItem('sunloc_server_url') || '';
  let _online = false, _lastCheck = 0;

  async function online() {
    const now = Date.now();
    if (now - _lastCheck < 30000) return _online;
    _lastCheck = now;
    if (!_url) { _online = false; return false; }
    try {
      const r = await fetch(_url + '/api/health', { signal: AbortSignal.timeout(3000) });
      _online = r.ok;
    } catch { _online = false; }
    updateBadge();
    return _online;
  }

  function updateBadge() {
    const el = document.getElementById('syncStatusBadge');
    if (!el) return;
    if (!_url) { el.innerHTML = '<span style="background:rgba(58,70,90,.5);color:#4a5568;padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer" onclick="SYNC.configure()">⚙ Set Server</span>'; return; }
    el.innerHTML = _online
      ? '<span style="background:rgba(0,230,118,.12);color:#00e676;border:1px solid rgba(0,230,118,.25);padding:2px 10px;border-radius:10px;font-size:10px">🟢 Synced</span>'
      : '<span style="background:rgba(255,171,0,.12);color:#ffab00;border:1px solid rgba(255,171,0,.25);padding:2px 10px;border-radius:10px;font-size:10px;cursor:pointer" onclick="SYNC.configure()">🟡 Offline</span>';
  }

  async function push(stateObj) {
    if (!(await online())) return;
    try {
      await fetch(_url + '/api/planning/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: stateObj }),
        signal: AbortSignal.timeout(6000)
      });
      _online = true; updateBadge();
    } catch { _online = false; updateBadge(); }
  }

  async function pull() {
    if (!(await online())) return null;
    try {
      const r = await fetch(_url + '/api/planning/state', { signal: AbortSignal.timeout(6000) });
      if (!r.ok) return null;
      const j = await r.json();
      _online = true; updateBadge();
      return j.state || null;
    } catch { _online = false; updateBadge(); return null; }
  }

  function configure() {
    const newUrl = prompt('Enter Sunloc Server URL:\n(e.g. https://sunloc.up.railway.app)\n\nLeave blank for offline mode.', _url);
    if (newUrl === null) return;
    _url = newUrl.trim().replace(/\/$/, '');
    localStorage.setItem('sunloc_server_url', _url);
    _lastCheck = 0;
    online().then(ok => { if (ok) loadFromServer(); });
  }

  async function loadFromServer() {
    const serverState = await pull();
    if (!serverState) return;
    Object.assign(state, serverState);
    state.pcCodes = PC_CODES_RAW;
    state.zoneMap = ZONE_MAP_RAW;
    // Persist locally too
    try { const s = {...serverState}; delete s.pcCodes; delete s.zoneMap; localStorage.setItem('sunloc_state', JSON.stringify(s)); } catch {}
    await loadTrackingStatus();
    render();
  }

  async function loadTrackingStatus() {
    if (!_url) return;
    try {
      const r = await fetch(_url + '/api/tracking/wip-summary', { signal: AbortSignal.timeout(5000) });
      if (!r.ok) return;
      const j = await r.json();
      if (!j.ok) return;
      const closureMap = {};
      j.closures.forEach(c => {
        if (!closureMap[c.batch_number]) closureMap[c.batch_number] = {};
        closureMap[c.batch_number][c.dept] = 'closed';
      });
      state.orders.forEach(ord => {
        if (ord.batchNumber && closureMap[ord.batchNumber]) {
          ord.stageStatus = closureMap[ord.batchNumber];
        }
      });
    } catch(e) {}
  }

  return { online, push, pull, configure, updateBadge, loadFromServer, loadTrackingStatus };
})();

// Load from localStorage (with server enrichment on init)
function loadState() {
  try {
    const saved = localStorage.getItem('sunloc_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(state, parsed);
      state.pcCodes = PC_CODES_RAW;
      state.zoneMap = ZONE_MAP_RAW;
    }
  } catch(e) {}
  // Async: try server (enriches actuals from DPR)
  setTimeout(() => SYNC.loadFromServer(), 500);
  // Check for month rollover after state is loaded
  setTimeout(() => initMonthlyArchive(), 800);
}

function openTrackingApp() {
  const url = localStorage.getItem('sunloc_server_url') || '';
  if (url) window.open(url + '/tracking.html', '_blank');
  else alert('Please configure the Server URL in Settings first.');
}

function saveState() {
  try {
    const toSave = {...state};
    delete toSave.pcCodes;
    delete toSave.zoneMap;
    localStorage.setItem('sunloc_state', JSON.stringify(toSave));
    SYNC.push(toSave); // async push to server — non-blocking
  } catch(e) {}
}

function fmt(n, dec=2) { return n==null?'-':(+n).toFixed(dec); }
function fmtDate(d) {
  if (!d) return '-';
  const dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}
function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}
function toDateInput(d) {
  if (!d) return '';
  const dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return '';
  return dt.toISOString().slice(0,10);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date(new Date().toDateString()); }

function getMachine(id) { return state.machineMaster.find(m=>m.id===id); }
function getPrintMachine(id) { return state.printMachineMaster.find(m=>m.id===id); }
function getPcByCode(size, code) {
  const list = state.pcCodes[size] || [];
  return list.find(p=>p.c===String(code));
}

// Calculate order schedule
function calcOrderSchedule(order, mc) {
  // Gross Qty = Net / (aGrade/100) — for unprinted
  // Gross Qty = Net * 1.07 * 1.02 — for printed (then unprinted=gross/1.07, printed=unprinted/1.02)
  const aGradePct = (order.aGrade || mc.aGrade) / 100;
  let grossQty, unprinted, printed;
  if (order.isPrinted) {
    grossQty = order.qty * 1.07 * 1.02;
    unprinted = grossQty / 1.07;
    printed = unprinted / 1.02;
  } else {
    grossQty = order.qty / aGradePct;
    unprinted = order.qty;
    printed = null;
  }
  const daysNeeded = grossQty / mc.cap;
  return {grossQty, unprinted, printed, daysNeeded, aGradePct};
}

// Recalculate end date for an order given start date and machine
function calcEndDate(startDate, daysNeeded) {
  const start = new Date(startDate);
  const end = new Date(start);
  end.setDate(end.getDate() + Math.ceil(daysNeeded));
  return end;
}

// Get machine orders sorted by start date
function getMachineOrders(machineId) {
  return state.orders
    .filter(o=>o.machineId===machineId && !o.deleted)
    .sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
}

// Recalculate all order dates on a machine after any change
function recalcMachineSchedule(machineId) {
  const mc = getMachine(machineId);
  if (!mc) return;
  const orders = getMachineOrders(machineId);
  let cursor = null;
  for (const ord of orders) {
    if (ord.status === 'closed') continue;
    if (!cursor) {
      cursor = new Date(ord.startDate || today());
    } else {
      ord.startDate = new Date(cursor);
    }
    const sc = calcOrderSchedule(ord, mc);
    ord.grossQty = sc.grossQty;
    ord.daysNeeded = sc.daysNeeded;
    ord.endDate = calcEndDate(ord.startDate, sc.daysNeeded);
    cursor = new Date(ord.endDate);
  }
  // Also update print orders for affected production orders
  recalcPrintSchedule();
  saveState();
}

// Recalculate print schedule based on production
function recalcPrintSchedule() {
  const printedOrders = state.orders.filter(o=>o.isPrinted && o.startDate && !o.deleted);
  for (const ord of printedOrders) {
    const existing = state.printOrders.find(p=>p.productionOrderId===ord.id);
    const printStart = new Date(ord.startDate);
    printStart.setHours(printStart.getHours() + 16);
    if (existing) {
      existing.startDate = printStart;
      // Recalc end
      const pm = getPrintMachine(existing.machineId);
      if (pm) {
        const daysNeeded = (ord.qty * 1.02) / pm.cap;
        existing.endDate = calcEndDate(printStart, daysNeeded);
      }
    }
  }
  // Recalc dispatch
  recalcDispatch();
}

function recalcDispatch() {
  // Update dispatch dates dynamically based on expected end dates (tentative)
  // Once an order is closed OR dispatch date was manually set, do NOT overwrite
  for (const dp of state.dispatchPlans) {
    if (dp.dateManuallySet) continue; // respect manual override always
    if (dp.status === 'dispatched') continue; // already dispatched — don't touch

    const ord = state.orders.find(o=>o.id===dp.productionOrderId);
    if (!ord) continue;

    if (isExportZone(ord.zone)) {
      // EXPORT: use container ready date if available, else estimate from latest endDate in container
      const T = getContainerReadyDate(ord);
      if (!T) {
        // Tentative: use the latest expected endDate among all container orders
        const containerOrders = state.orders.filter(o =>
          !o.deleted && (o.containerRef || o.poNumber) === (ord.containerRef || ord.poNumber) && isExportZone(o.zone)
        );
        const latestEnd = containerOrders.reduce((max, o) => {
          const d = o.endDate ? new Date(o.endDate) : null;
          return (d && (!max || d > max)) ? d : max;
        }, null);
        if (latestEnd) {
          const offset = getContainerOffset(ord);
          dp.plannedDate = addDays(latestEnd, offset);
          dp.tentative = true;
        } else {
          dp.plannedDate = null;
        }
        dp.exportPending = true;
      } else {
        const offset = getContainerOffset(ord);
        dp.plannedDate = addDays(T, offset);
        dp.exportPending = false;
        dp.tentative = false; // confirmed — container complete
      }
    } else {
      // DOMESTIC: T+2 UP, T+3 PTD from expected endDate (or confirmed closedDate if closed)
      const T = ord.status === 'closed' && ord.closedDate
        ? (ord.isPrinted ? (state.printOrders.find(p=>p.productionOrderId===ord.id)?.endDate || ord.closedDate) : ord.closedDate)
        : (ord.isPrinted ? (state.printOrders.find(p=>p.productionOrderId===ord.id)?.endDate || ord.endDate) : ord.endDate);
      if (!T) continue;
      const offset = ord.isPrinted ? 3 : 2;
      dp.plannedDate = addDays(T, offset);
      dp.exportPending = false;
      dp.tentative = (ord.status !== 'closed'); // tentative until order is closed
    }
  }
  saveState();
}

// Called when any export-zone order is closed — check if container is now complete
// and consolidate all sibling dispatch entries into one
function checkAndConsolidateExportContainer(ord) {
  if (!isExportZone(ord.zone)) return;
  const T = getContainerReadyDate(ord);
  if (!T) return; // container not yet complete

  const offset = getContainerOffset(ord);
  const plannedDate = addDays(T, offset);
  const siblings = getContainerSiblings(ord);
  const allOrders = [ord, ...siblings];

  // Find existing dispatch entries for all orders in this container
  const existingDPs = state.dispatchPlans.filter(dp =>
    allOrders.some(o => o.id === dp.productionOrderId) && !dp.isConsolidatedExport
  );

  if (existingDPs.length === 0) return;

  // Compute totals
  const totalQty = allOrders.reduce((s,o)=>s+o.qty,0);
  const size = ord.size; // assume same size within container
  const packSize = state.packSizes[size]||100000;
  const totalBoxes = Math.ceil(totalQty*100000/packSize);
  const isPtd = allOrders.some(o=>o.isPrinted);
  const containerRef = ord.containerRef || ord.poNumber || '';

  // Remove individual dispatch entries and replace with one consolidated entry
  const dpIds = existingDPs.map(dp=>dp.id);
  state.dispatchPlans = state.dispatchPlans.filter(dp=>!dpIds.includes(dp.id));

  state.dispatchPlans.push({
    id: uid(),
    isConsolidatedExport: true,
    containerRef,
    productionOrderId: ord.id, // representative order
    allProductionOrderIds: allOrders.map(o=>o.id),
    customer: ord.customer,
    batchNumber: allOrders.map(o=>o.batchNumber).filter(Boolean).join(', '),
    poNumber: ord.poNumber,
    size,
    pcCode: allOrders.map(o=>o.pcCode).filter(Boolean).join(', '),
    colour: allOrders.map(o=>o.colour).filter(Boolean).join(' | '),
    packing: isPtd ? 'PTD' : 'UP',
    zone: ord.zone,
    qty: totalQty,
    boxes: totalBoxes,
    plannedDate,
    actualDispatched: 0,
    status: 'pending',
    exportPending: false,
    remarks: `Container: ${containerRef} — ${allOrders.length} production orders consolidated`,
  });
  saveState();
}

    <td><input type="text" value="${ord.remarks||''}" placeholder="Add remark..." 
      style="width:130px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px"
      onchange="updateOrderRemark('${ord.id}',this.value)"></td>
    <td style="white-space:nowrap">
      ${canClose?`<button class="btn btn-success btn-sm" onclick="closeOrder('${ord.id}','${mc.id}')">✓ Close</button> `:''}
      <button class="btn btn-ghost btn-sm" onclick="editOrder('${ord.id}')">✏️</button>
      <button class="btn btn-danger btn-sm" style="padding:5px 7px" onclick="deleteOrder('${ord.id}','${mc.id}')">✕</button>
    </td>
  </tr>`;
}

function switchSizeTab(el, size) {
  document.querySelectorAll('#size-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.mc-panel').forEach(panel=>{
    panel.style.display = (size==='all' || panel.dataset.size===size) ? '' : 'none';
  });
}

function updateMachineAGrade(machineId, val) {
  const mc = state.machineMaster.find(m=>m.id===machineId);
  if (mc) { mc.aGrade = parseFloat(val)||93; recalcMachineSchedule(machineId); }
}

function updateActualProd(ordId, val, machineId) {
  const ord = state.orders.find(o=>o.id===ordId);
  if (ord) {
    ord.actualProd = parseFloat(val)||0;
    if (ord.actualProd > 0 && ord.status === 'pending') ord.status = 'running';
    saveState();
  }
}

function updateOrderRemark(ordId, val) {
  const ord = state.orders.find(o=>o.id===ordId);
  if (ord) { ord.remarks = val; saveState(); }
}

function closeOrder(ordId, machineId) {
  const ord = state.orders.find(o=>o.id===ordId);
  if (ord) {
    ord.status = 'closed';
    ord.closedDate = new Date();
    saveState();
    // For export zones: check if this closes the container and consolidate dispatch
    if (isExportZone(ord.zone)) {
      checkAndConsolidateExportContainer(ord);
    }
    render();
  }
}

function deleteOrder(ordId, machineId) {
  if (!confirm('Delete this order?')) return;
  state.orders = state.orders.filter(o=>o.id!==ordId);
  state.printOrders = state.printOrders.filter(p=>p.productionOrderId!==ordId);
  recalcMachineSchedule(machineId);
  render();
}

function editOrder(ordId) {
  const ord = state.orders.find(o=>o.id===ordId);
  if (ord) showAddOrderModal(ord.machineId, ord);
}

function updatePoType(sel) {
  const grp = document.getElementById('fo-ponum-group');
  if (grp) grp.style.display = sel.value === 'verbal' ? 'none' : '';
}

function onMachineChange(sel) {
  const mc = getMachine(sel.value);
  if (mc) {
    const sizeEl = document.getElementById('fo-size');
    if (sizeEl) { sizeEl.value = mc.size; onSizeChange(sizeEl); }
    const ag = document.getElementById('fo-agrade');
    if (ag) ag.value = mc.aGrade;
    updateGrossCalc();
  }
}

function onSizeChange(sel) {
  const size = sel.value;
  const pcEl = document.getElementById('fo-pccode');
  if (!pcEl) return;
  const pcList = state.pcCodes[size] || [];
  pcEl.innerHTML = '<option value="">Select PC Code</option>' +
    pcList.map(p=>`<option value="${p.c}">${p.c} — ${p.n}</option>`).join('');
}

function onPcChange(sel) {
  const size = document.getElementById('fo-size')?.value;
  const code = sel.value;
  const pc = getPcByCode(size, code);
  if (pc) {
    const colEl = document.getElementById('fo-colour');
    if (colEl) colEl.value = pc.n;
  }
}

function updateGrossCalc() {
  const qty = parseFloat(document.getElementById('fo-qty')?.value)||0;
  const ag = parseFloat(document.getElementById('fo-agrade')?.value)||93;
  const isPtd = document.getElementById('fo-printed')?.value === '1';
  const infoEl = document.getElementById('fo-calc-info');
  if (!infoEl || qty === 0) return;
  let gross, unprinted, days;
  const mcId = document.getElementById('fo-machine')?.value;
  const mc = getMachine(mcId);
  if (isPtd) {
    gross = qty * 1.07 * 1.02;
    unprinted = gross / 1.07;
    days = gross / (mc?.cap||20);
    infoEl.innerHTML = `📊 <strong>Gross to Manufacture:</strong> ${fmt(gross)}L &nbsp;|&nbsp; <strong>Unprinted after Mfg:</strong> ${fmt(unprinted)}L &nbsp;|&nbsp; <strong>After Printing (${(100/1.02).toFixed(1)}%):</strong> ${fmt(qty)}L &nbsp;|&nbsp; <strong>Days on Machine:</strong> ${fmt(days,1)}d`;
  } else {
    gross = qty / (ag/100);
    days = gross / (mc?.cap||20);
    infoEl.innerHTML = `📊 <strong>Gross to Manufacture:</strong> ${fmt(gross)}L &nbsp;|&nbsp; <strong>Net A-Grade @ ${ag}%:</strong> ${fmt(qty)}L &nbsp;|&nbsp; <strong>Days on Machine:</strong> ${fmt(days,1)}d`;
  }
}

function saveOrderModal(existingId, defaultMachine) {
  const machineId = document.getElementById('fo-machine')?.value || defaultMachine;
  const mc = getMachine(machineId);
  if (!mc) return alert('Please select a machine');

  const qty = parseFloat(document.getElementById('fo-qty')?.value)||0;
  if (!qty) return alert('Please enter order quantity');

  const isPrinted = document.getElementById('fo-printed')?.value === '1';
  const ag = parseFloat(document.getElementById('fo-agrade')?.value)||mc.aGrade;
  let grossQty, daysNeeded;
  if (isPrinted) {
    grossQty = qty * 1.07 * 1.02;
  } else {
    grossQty = qty / (ag/100);
  }
  daysNeeded = grossQty / mc.cap;

  const startDate = new Date(document.getElementById('fo-startdate')?.value || today());
  const endDate = calcEndDate(startDate, daysNeeded);

  const size = document.getElementById('fo-size')?.value;
  const pcCode = document.getElementById('fo-pccode')?.value;

  const ord = {
    id: existingId || uid(),
    machineId,
    poType: document.getElementById('fo-potype')?.value,
    poNumber: document.getElementById('fo-ponum')?.value,
    batchNumber: document.getElementById('fo-batch')?.value,
    customer: document.getElementById('fo-customer')?.value,
    size,
    pcCode,
    colour: document.getElementById('fo-colour')?.value,
    isPrinted,
    printMatter: document.getElementById('fo-ptdmatter')?.value,
    qty,
    aGrade: ag,
    grossQty,
    daysNeeded,
    startDate,
    endDate,
    packing: document.getElementById('fo-packing')?.value,
    zone: document.getElementById('fo-zone')?.value,
    containerRef: document.getElementById('fo-containerref')?.value || '',
    remarks: document.getElementById('fo-remarks')?.value,
    status: existingId ? (state.orders.find(o=>o.id===existingId)?.status||'pending') : 'pending',
    actualProd: existingId ? (state.orders.find(o=>o.id===existingId)?.actualProd||0) : 0,
  };

  if (existingId) {
    const idx = state.orders.findIndex(o=>o.id===existingId);
    if (idx>=0) state.orders[idx] = ord;
  } else {
    state.orders.push(ord);
  }

  // Auto-create print order if PTD
  if (isPrinted && !state.printOrders.find(p=>p.productionOrderId===ord.id)) {
    const printStart = new Date(startDate);
    printStart.setHours(printStart.getHours() + 16);
    state.printOrders.push({
      id: uid(),
      productionOrderId: ord.id,
      customer: ord.customer,
      size,
      pcCode,
      colour: ord.colour,
      printMatter: ord.printMatter,
      zone: ord.zone,
      qtyToPrint: qty * 1.02,
      startDate: printStart,
      endDate: null,
      machineId: null,
      status: 'pending',
      remarks: '',
    });
  }

  // Auto-create dispatch plan
  if (!state.dispatchPlans.find(d=>d.productionOrderId===ord.id || (d.allProductionOrderIds||[]).includes(ord.id))) {
    const packSize = state.packSizes[size] || 100000;
    const totalCapsules = qty * 100000;
    const boxes = Math.ceil(totalCapsules / packSize);

    if (isExportZone(ord.zone)) {
      // EXPORT: create a pending placeholder — dispatch date stays null until all container orders closed
      state.dispatchPlans.push({
        id: uid(),
        isExportPlaceholder: true,
        containerRef: ord.containerRef || ord.poNumber || '',
        productionOrderId: ord.id,
        customer: ord.customer,
        batchNumber: ord.batchNumber,
        poNumber: ord.poNumber,
        size,
        pcCode,
        colour: ord.colour,
        packing: isPrinted ? 'PTD' : 'UP',
        zone: ord.zone,
        qty,
        boxes,
        plannedDate: null,   // set when container is complete
        actualDispatched: 0,
        status: 'export-pending',
        exportPending: true,
        remarks: `Awaiting all orders in container "${ord.containerRef || ord.poNumber}" to be closed`,
      });
    } else {
      // DOMESTIC: T+2 UP or T+3 PTD from this order's own end date
      const offset = isPrinted ? 3 : 2;
      const dispDate = addDays(endDate, offset);
      state.dispatchPlans.push({
        id: uid(),
        productionOrderId: ord.id,
        customer: ord.customer,
        batchNumber: ord.batchNumber,
        poNumber: ord.poNumber,
        size,
        pcCode,
        colour: ord.colour,
        packing: isPrinted ? 'PTD' : 'UP',
        zone: ord.zone,
        qty,
        boxes,
        plannedDate: dispDate,
        actualDispatched: 0,
        status: 'pending',
        exportPending: false,
        tentative: true,
        dateManuallySet: false,
        remarks: '',
      });
    }
  }

  recalcMachineSchedule(machineId);
  closeModal();
  render();
}

function importSAP() {
  openModal('Import from SAP / Upload Template', `
    <div style="margin-bottom:16px">
      <div class="alert alert-info">Upload an Excel file exported from SAP B1, or use the Sunloc standard template.</div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="downloadSAPTemplate()">📥 Download SAP Template</button>
      <label class="btn btn-primary" style="cursor:pointer">
        📤 Upload SAP Export
        <input type="file" accept=".xlsx,.xls,.csv" onchange="processSAPFile(this)">
      </label>
    </div>
    <div class="alert alert-warn">
      <strong>Template Columns:</strong> PO Number, Batch Number, Customer, Size, PC Code, Colour, Printed (Y/N), Qty (Lakhs), Packing, Zone, Printing Matter, Remarks
    </div>
    <div id="sap-preview"></div>
  `, [{label:'Close', cls:'btn-secondary', fn:'closeModal()'}]);
}

function downloadSAPTemplate() {
  const headers = ['PO_Number','Batch_Number','Customer','Size','PC_Code','Colour','Printed_YN','Qty_Lakhs','Machine_ID','Packing','Zone','Printing_Matter','Remarks'];
  const sample = ['26ZD23','BT001','ALKEM','2','21065','PU/WH','N','100','MC30','HDCL','BADDI','',''];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, sample]);
  XLSX.utils.book_append_sheet(wb, ws, 'SAP_Import');
  XLSX.writeFile(wb, 'Sunloc_SAP_Import_Template.xlsx');
}

function processSAPFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const preview = document.getElementById('sap-preview');
      preview.innerHTML = `<div class="alert alert-success">✓ Found ${rows.length} orders to import</div>
        <div class="table-wrap" style="max-height:200px;overflow-y:auto">
        <table><thead><tr>${Object.keys(rows[0]||{}).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,5).map(r=>`<tr>${Object.values(r).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>
        <div class="mt-4"><button class="btn btn-primary" onclick="confirmSAPImport(${JSON.stringify(rows).replace(/"/g,'&quot;')})">✓ Import ${rows.length} Orders</button></div>`;
    } catch(err) {
      document.getElementById('sap-preview').innerHTML = `<div class="alert alert-warn">Error reading file: ${err.message}</div>`;
    }
  };
  reader.readAsBinaryString(file);
}

function confirmSAPImport(rows) {
  let imported = 0;
  for (const row of rows) {
    const machineId = row.Machine_ID || row['Machine ID'] || '';
    const mc = getMachine(machineId);
    const qty = parseFloat(row.Qty_Lakhs || row['Qty (Lakhs)'] || 0);
    if (!qty) continue;
    const isPrinted = (row.Printed_YN || row['Printed (Y/N)'] || 'N').toUpperCase() === 'Y';
    const size = String(row.Size || '');
    const ag = mc?.aGrade || 93;
    const grossQty = isPrinted ? qty*1.07*1.02 : qty/(ag/100);
    const daysNeeded = grossQty / (mc?.cap||20);
    const startDate = today();
    const endDate = calcEndDate(startDate, daysNeeded);
    state.orders.push({
      id: uid(),
      machineId,
      poType: 'po',
      poNumber: String(row.PO_Number || row['PO Number'] || ''),
      batchNumber: String(row.Batch_Number || row['Batch Number'] || ''),
      customer: String(row.Customer || ''),
      size,
      pcCode: String(row.PC_Code || row['PC Code'] || ''),
      colour: String(row.Colour || ''),
      isPrinted,
      printMatter: String(row.Printing_Matter || row['Printing Matter'] || ''),
      qty, aGrade:ag, grossQty, daysNeeded, startDate, endDate,
      packing: String(row.Packing || ''),
      zone: String(row.Zone || ''),
      remarks: String(row.Remarks || ''),
      status: 'pending', actualProd: 0,
    });
    imported++;
  }
  if (mc) recalcMachineSchedule(machineId);
  else saveState();
  closeModal();
  alert(`✓ Imported ${imported} orders successfully`);
  render();
}

function exportProdPlan() {
  const rows = state.orders.map(ord=>{
    const mc = getMachine(ord.machineId);
    return {
      Machine: ord.machineId, 'PO Number': ord.poNumber, 'Batch No': ord.batchNumber,
      Customer: ord.customer, Size: ord.size, 'PC Code': ord.pcCode, Colour: ord.colour,
      'PTD/UP': ord.isPrinted?'PTD':'UP', 'Order Qty (L)': ord.qty, 'Gross Qty (L)': fmt(ord.grossQty),
      'Start Date': fmtDate(ord.startDate), 'End Date': fmtDate(ord.endDate),
      'Actual Prod': ord.actualProd||0, Status: ord.status, Zone: ord.zone, Remarks: ord.remarks
    };
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Production Plan');
  XLSX.writeFile(wb, `Sunloc_Production_Plan_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// =============================
function renderProdSummary() {
  const topActions = document.getElementById('topbar-actions');
  topActions.innerHTML = '';
  const orders = state.orders.filter(o=>!o.deleted);

  // Size wise totals
  const sizeStats = {};
  for (const sz of SIZES) {
    const mcs = state.machineMaster.filter(m=>m.size===sz);
    const totalCap = mcs.reduce((s,m)=>s+m.cap,0);
    const planned = orders.filter(o=>o.size===sz).reduce((s,o)=>s+o.qty,0);
    sizeStats[sz] = {cap:totalCap, planned, available:Math.max(0,totalCap-planned)};
  }

  // Customer × Size matrix
  const customers = [...new Set(orders.map(o=>o.customer).filter(Boolean))].sort();
  const custMatrix = {};
  for (const c of customers) {
    custMatrix[c] = {};
    for (const sz of SIZES) {
      const tot = orders.filter(o=>o.customer===c&&o.size===sz).reduce((s,o)=>s+o.qty,0);
      custMatrix[c][sz] = tot||null;
    }
    custMatrix[c]._total = orders.filter(o=>o.customer===c).reduce((s,o)=>s+o.qty,0);
  }

  const totalPlanned = orders.reduce((s,o)=>s+o.qty,0);
  const sizesWithData = SIZES.filter(sz=>orders.some(o=>o.size===sz));

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">Total Orders</div><div class="kpi-value">${orders.length}</div></div>
      <div class="kpi" style="--kpi-color:var(--accent2)"><div class="kpi-label">Total Planned (Lakhs)</div><div class="kpi-value">${fmt(totalPlanned,0)}</div></div>
      <div class="kpi" style="--kpi-color:var(--accent3)"><div class="kpi-label">Closed Orders</div><div class="kpi-value">${orders.filter(o=>o.status==='closed').length}</div></div>
      <div class="kpi" style="--kpi-color:var(--accent5)"><div class="kpi-label">PTD Orders</div><div class="kpi-value">${orders.filter(o=>o.isPrinted).length}</div></div>
    </div>

    <div class="grid-2 mb-4">
      <div class="card">
        <div class="card-title">Size-wise Capacity vs Planned</div>
        <table class="summary-table">
          <thead><tr><th>Size</th><th>Capacity/Day (L)</th><th>Planned (L)</th><th>Status</th></tr></thead>
          <tbody>
            ${SIZES.map(sz=>{
              const st = sizeStats[sz];
              const pct = st.cap>0 ? (st.planned/st.cap*100).toFixed(0) : 0;
              return `<tr>
                <td><strong>Size ${sz}</strong></td>

function renderPrintRow(p, pm) {
  const balance = (p.qtyToPrint||0) - (p.printedToDate||0);
  const statusBadge = p.status==='completed'?'<span class="badge badge-completed">Completed</span>':
    p.status==='running'?'<span class="badge badge-running">Running</span>':
    '<span class="badge badge-pending">Pending</span>';
  return `<tr>
    <td style="font-weight:500">${p.customer||'-'}</td>
    <td class="text-mono">${p.batchNumber||'-'}</td>
    <td class="text-mono text-accent">${p.pcCode||'-'}</td>
    <td class="text-mono">${p.size||'-'}</td>
    <td style="font-size:12px">${p.colour||'-'}</td>
    <td style="font-size:12px">${p.printMatter||'-'}</td>
    <td><select class="form-control" style="width:90px;padding:3px 6px;font-size:12px" onchange="updatePrintField('${p.id}','printType',this.value)">
      <option value="C" ${p.printType==='C'?'selected':''}>Circular</option>
      <option value="L" ${p.printType==='L'?'selected':''}>Linear</option>
    </select></td>
    <td class="text-mono">${fmt(p.orderQty||p.qty||0)}</td>
    <td class="text-mono text-blue">${fmt(p.qtyToPrint)}</td>
    <td class="text-mono">${pm.cap}</td>
    <td style="white-space:nowrap">
      <input type="number" value="${p.printedToDate||0}" min="0" 
        style="width:65px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;font-family:var(--mono)"
        onchange="updatePrintField('${p.id}','printedToDate',this.value)">
      <span style="font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px;${p.printedToDateManual ? 'background:rgba(0,230,118,0.1);color:#00e676;border:1px solid rgba(0,230,118,0.2)' : 'background:rgba(0,212,255,0.1);color:#00d4ff;border:1px solid rgba(0,212,255,0.2)'}">${p.printedToDateManual ? 'Manual' : 'Auto'}</span>
    </td>
    <td class="text-mono ${balance<0?'text-green':balance>0?'text-accent':''}">${fmt(balance)}</td>
    <td class="text-mono" style="white-space:nowrap">${fmtDate(p.startDate)}</td>
    <td class="text-mono" style="white-space:nowrap">${fmtDate(p.endDate)}</td>
    <td>${statusBadge}</td>
    <td class="text-sm">${p.zone||'-'}</td>
    <td><input type="text" value="${p.remarks||''}" placeholder="Remarks..."
      style="width:120px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px"
      onchange="updatePrintField('${p.id}','remarks',this.value)"></td>
    <td><button class="btn btn-ghost btn-sm" onclick="editPrintOrder('${p.id}')">✏️</button>
      ${p.status!=='completed'?`<button class="btn btn-success btn-sm" onclick="closePrintOrder('${p.id}')">✓</button>`:''}
    </td>
  </tr>`;
}

function updatePrintField(id, field, val) {
  const p = state.printOrders.find(o=>o.id===id);
  if (!p) return;
  p[field] = field==='printedToDate'?parseFloat(val)||0:val;
  if (field==='printedToDate') {
    p.printedToDateManual = true; // mark as manually set — daily log auto-sync will not overwrite
    if (p.printedToDate >= (p.qtyToPrint||0)) p.status='completed';
    else if (p.printedToDate > 0) p.status='running';
  }
  saveState();
}

function closePrintOrder(id) {
  const p = state.printOrders.find(o=>o.id===id);
  if (p) { p.status='completed'; saveState(); render(); }
}

function savePrintModal(existingId) {
  const machineId = document.getElementById('fp-machine')?.value;
  const pm = machineId ? getPrintMachine(machineId) : null;
  const qty = parseFloat(document.getElementById('fp-qty')?.value)||0;
  const startDate = new Date(document.getElementById('fp-startdate')?.value||today());
  const endDate = pm && qty ? calcEndDate(startDate, qty/pm.cap) : null;
  const ord = {
    id: existingId||uid(),
    productionOrderId: existingId ? state.printOrders.find(p=>p.id===existingId)?.productionOrderId : null,
    machineId: machineId||null,
    customer: document.getElementById('fp-customer')?.value,
    batchNumber: document.getElementById('fp-batch')?.value,
    pcCode: document.getElementById('fp-pccode')?.value,
    size: document.getElementById('fp-size')?.value,
    colour: document.getElementById('fp-colour')?.value,
    printMatter: document.getElementById('fp-ptdmatter')?.value,
    printType: document.getElementById('fp-printtype')?.value,
    qtyToPrint: qty,
    startDate, endDate,
    zone: document.getElementById('fp-zone')?.value,
    status: document.getElementById('fp-status')?.value,
    printedToDate: existingId ? (state.printOrders.find(p=>p.id===existingId)?.printedToDate||0) : 0,
    remarks: document.getElementById('fp-remarks')?.value,
  };
  if (existingId) {
    const idx = state.printOrders.findIndex(p=>p.id===existingId);
    if (idx>=0) state.printOrders[idx]=ord;
  } else {
    state.printOrders.push(ord);
  }
  saveState(); closeModal(); render();
}

function editPrintOrder(id) { showAddPrintModal(null, id); }

function exportPrintPlan() {
  const rows = state.printOrders.map(p=>({
    Machine: p.machineId||'Unassigned', Customer:p.customer, 'Batch No':p.batchNumber,
    'PC Code':p.pcCode, Size:p.size, Colour:p.colour, 'Print Matter':p.printMatter,
    'L/C':p.printType, 'Qty to Print (L)':fmt(p.qtyToPrint), 'Printed to Date':p.printedToDate||0,
    'Balance':fmt((p.qtyToPrint||0)-(p.printedToDate||0)),
    'Start Date':fmtDate(p.startDate), 'End Date':fmtDate(p.endDate),
    Status:p.status, Zone:p.zone, Remarks:p.remarks
  }));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Print Plan');
  XLSX.writeFile(wb,`Sunloc_Print_Plan_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function renderDailyPrinting() {
  const topActions = document.getElementById('topbar-actions');
  topActions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showDailyPrintingModal()">+ Log Today's Printing</button>`;

  const logs = state.dailyPrinting.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const content = document.getElementById('content');

  // Aggregate salvage stats
  const totalPrinted = logs.reduce((s,l)=>s+(l.totalOutput||0),0);
  const totalSalvage = logs.reduce((s,l)=>s+(l.salvage||0),0);
  const salvagePct = totalPrinted>0?(totalSalvage/totalPrinted*100).toFixed(2):0;

  content.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">Log Days</div><div class="kpi-value">${logs.length}</div></div>
      <div class="kpi" style="--kpi-color:var(--accent2)"><div class="kpi-label">Total Printed (kg)</div><div class="kpi-value">${fmt(totalPrinted,0)}</div></div>
      <div class="kpi" style="--kpi-color:var(--accent4)"><div class="kpi-label">Total Salvage (kg)</div><div class="kpi-value">${fmt(totalSalvage,1)}</div></div>
      <div class="kpi" style="--kpi-color:${salvagePct>2?'var(--accent4)':'var(--accent3)'}">
        <div class="kpi-label">Cumulative Salvage %</div>
        <div class="kpi-value" style="color:${salvagePct>2?'var(--accent4)':'var(--accent3)'}">${salvagePct}%</div>
        <div class="kpi-sub">${salvagePct>2?'⚠️ Above 2% threshold':'✓ Within limit'}</div>
      </div>
    </div>
    ${salvagePct>2?'<div class="alert alert-warn">⚠️ Cumulative salvage is above 2% threshold. Review printing operations.</div>':''}
    <div class="card">
      <div class="card-title">Daily Printing Logs</div>
      ${logs.length===0?'<div class="empty-state"><p>No daily logs yet</p></div>':`
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Batch / Print Order</th><th>Machine</th><th>Size</th><th>PC Code</th><th>Print Matter</th>
            <th>Shift A (Qty L)</th><th>Shift B (Qty L)</th><th>Shift C (Qty L)</th><th>Total Qty (L)</th>
            <th>Shift A (kg)</th><th>Shift B (kg)</th><th>Shift C (kg)</th><th>Total Output (kg)</th>
            <th>Salvage (kg)</th><th>Salvage %</th><th>Cumul. Salvage %</th><th>Remarks</th>
          </tr></thead>
          <tbody>
            ${logs.map((l,i)=>{
              const cumSalvage = logs.slice(i).reduce((s,x)=>s+(x.salvage||0),0);
              const cumOutput = logs.slice(i).reduce((s,x)=>s+(x.totalOutput||0),0);
              const cumPct = cumOutput>0?(cumSalvage/cumOutput*100).toFixed(2):0;
              const linkedPO = l.printOrderId ? state.printOrders.find(p=>p.id===l.printOrderId) : null;
              const batchLabel = linkedPO ? (linkedPO.batchNumber || linkedPO.pcCode || l.printOrderId) : (l.pcCode || '-');
              return `<tr>
                <td class="text-mono">${fmtDate(l.date)}</td>
                <td class="text-mono text-accent">${batchLabel}</td>
                <td class="text-mono text-accent">${l.machineId||'-'}</td>
                <td class="text-mono">${l.size||'-'}</td>
                <td class="text-mono">${l.pcCode||'-'}</td>
                <td class="text-sm">${l.printMatter||'-'}</td>
                <td class="text-mono">${fmt(l.shiftAqty||0,2)}</td>
                <td class="text-mono">${fmt(l.shiftBqty||0,2)}</td>
                <td class="text-mono">${fmt(l.shiftCqty||0,2)}</td>
                <td class="text-mono fw-bold text-green">${fmt(l.totalQtyLakhs||0,2)}</td>
                <td class="text-mono">${fmt(l.shiftA,1)}</td>
                <td class="text-mono">${fmt(l.shiftB,1)}</td>
                <td class="text-mono">${fmt(l.shiftC,1)}</td>
                <td class="text-mono fw-bold">${fmt((l.shiftA||0)+(l.shiftB||0)+(l.shiftC||0),1)}</td>
                <td class="text-mono ${(l.salvagePct||0)>2?'text-red':''}">${fmt(l.salvage,2)}</td>
                <td class="text-mono ${(l.salvagePct||0)>2?'text-red':''}">${fmt(l.salvagePct,2)}%</td>
                <td class="text-mono ${cumPct>2?'text-red':'text-green'}">${cumPct}%</td>
                <td class="text-sm">${l.remarks||'-'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
  `;
}

      </div>

      </div>
      <div class="form-group">
        <label>Salvage %</label>
        <input class="form-control" id="dl-salvagepct" readonly placeholder="Auto-calculated">
      </div>

}

function updateDLTotals() {
  const a = parseFloat(document.getElementById('dl-shiftA-qty')?.value)||0;
  const b = parseFloat(document.getElementById('dl-shiftB-qty')?.value)||0;
  const c = parseFloat(document.getElementById('dl-shiftC-qty')?.value)||0;
  const el = document.getElementById('dl-total-qty');
  if (el) el.value = fmt(a+b+c, 2) + ' L';
}

function updateSalvagePct() {
  const output = parseFloat(document.getElementById('dl-output')?.value)||0;
  const salvage = parseFloat(document.getElementById('dl-salvage')?.value)||0;
  const pct = output>0?(salvage/output*100).toFixed(2):0;
  const el = document.getElementById('dl-salvagepct');
  if (el) { el.value = pct+'%'; el.style.color = pct>2?'var(--accent4)':'var(--accent3)'; }
}

function saveDailyLog() {
  const output = parseFloat(document.getElementById('dl-output')?.value)||0;
  const salvage = parseFloat(document.getElementById('dl-salvage')?.value)||0;
  const shiftAqty = parseFloat(document.getElementById('dl-shiftA-qty')?.value)||0;
  const shiftBqty = parseFloat(document.getElementById('dl-shiftB-qty')?.value)||0;
  const shiftCqty = parseFloat(document.getElementById('dl-shiftC-qty')?.value)||0;
  const totalQtyLakhs = shiftAqty + shiftBqty + shiftCqty;
  const linkedPrintOrderId = document.getElementById('dl-batch')?.value || null;

  const logEntry = {
    id: uid(),
    date: new Date(document.getElementById('dl-date')?.value||today()),
    machineId: document.getElementById('dl-machine')?.value,
    printOrderId: linkedPrintOrderId,
    size: document.getElementById('dl-size')?.value,
    pcCode: document.getElementById('dl-pccode')?.value,
    printMatter: document.getElementById('dl-ptdmatter')?.value,
    shiftA: parseFloat(document.getElementById('dl-shiftA')?.value)||0,
    shiftB: parseFloat(document.getElementById('dl-shiftB')?.value)||0,
    shiftC: parseFloat(document.getElementById('dl-shiftC')?.value)||0,
    shiftAqty, shiftBqty, shiftCqty, totalQtyLakhs,
    totalOutput: output, salvage,
    salvagePct: output>0?(salvage/output*100):0,
    remarks: document.getElementById('dl-remarks')?.value,
  };
  state.dailyPrinting.push(logEntry);

  // Auto-update Printed to Date on the matched print order (unless manually overridden)
  if (linkedPrintOrderId) {
    const po = state.printOrders.find(p => p.id === linkedPrintOrderId);
    if (po && !po.printedToDateManual) {
      // Sum all log entries for this print order
      const totalPrinted = state.dailyPrinting
        .filter(l => l.printOrderId === linkedPrintOrderId)
        .reduce((s, l) => s + (l.totalQtyLakhs || 0), 0);
      po.printedToDate = parseFloat(totalPrinted.toFixed(3));
      if (po.printedToDate >= (po.qtyToPrint || 0)) po.status = 'completed';
      else if (po.printedToDate > 0) po.status = 'running';
    }
  }

  saveState(); closeModal(); render();
}

function renderDispatch() {
  const topActions = document.getElementById('topbar-actions');
  topActions.innerHTML = `
    <div style="position:relative;display:inline-block" id="export-wrap">
      <button class="btn btn-secondary btn-sm" onclick="toggleExportMenu()">📤 Export ▾</button>
      <div id="export-menu" style="display:none;position:absolute;right:0;top:34px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;min-width:250px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.5)">
        <div style="padding:6px 0">
          <div onclick="exportDispatchPlan()" style="padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text)" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">📋 Full Dispatch Plan (All Zones)</div>
          <div onclick="exportCustomerWise()" style="padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text)" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">👤 Customer-wise Reports (Separate Files)</div>
          <div onclick="exportZoneWise()" style="padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text)" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">🗺️ Zone-wise Report (Multi-sheet)</div>
          <div onclick="exportPendingDispatch()" style="padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text)" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">⏳ Pending Dispatch Summary</div>
          <div onclick="exportFullOrderTracker()" style="padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text)" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">📊 Full Order Tracker (Prod + Dispatch)</div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="showAddDispatchModal()">+ Add Dispatch</button>
  `;

  const plans = state.dispatchPlans.sort((a,b)=>new Date(a.plannedDate)-new Date(b.plannedDate));
  const zones = [...new Set(plans.map(p=>p.zone||'Unassigned'))].sort();

  // Box readiness analysis
  const readyByZone = {};
  for (const z of ZONES) {
    const zPlans = plans.filter(p=>p.zone===z && p.status!=='dispatched');
    const readyBoxes = zPlans.filter(p=>{
      const ord = state.orders.find(o=>o.id===p.productionOrderId);
      return !ord || ord.status==='closed';
    }).reduce((s,p)=>s+(p.boxes||0),0);
    readyByZone[z] = {ready:readyBoxes, total:zPlans.reduce((s,p)=>s+(p.boxes||0),0), count:zPlans.length};
  }

  let html = `
    <div class="alert alert-info mb-4">🚚 Truck dispatch is triggered when ≥ <strong>${TRUCK_CAPACITY} boxes</strong> are ready for a zone/route.</div>
    <div class="card mb-4">
      <div class="card-title">Zone Readiness Dashboard</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
        ${ZONES.map(z=>{
          const zd = readyByZone[z];
          if (!zd || zd.total===0) return '';
          const pct = Math.min(100,(zd.ready/TRUCK_CAPACITY*100)).toFixed(0);
          const isReady = zd.ready >= TRUCK_CAPACITY;
          return `<div class="mc-card" style="${isReady?'border-color:var(--accent3)':''}">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span class="text-mono text-sm fw-bold ${isReady?'text-green':''}">${z}</span>
              ${isReady?'<span class="badge badge-completed">Ready</span>':'<span class="badge badge-pending">Filling</span>'}
            </div>
            <div class="text-mono" style="font-size:20px;font-weight:700;color:var(--text)">${zd.ready}<span class="text-dim text-sm">/${TRUCK_CAPACITY} boxes</span></div>
            <div class="progress-bar mt-4"><div class="progress-fill ${isReady?'green':'blue'}" style="width:${pct}%"></div></div>
            <div class="text-dim text-sm mt-4">${zd.count} orders pending</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="tabs" id="dispatch-zone-tabs">
      <div class="tab active" onclick="switchDispatchTab(this,'all')">All Zones</div>
      ${zones.map(z=>`<div class="tab" onclick="switchDispatchTab(this,'${z}')">${z}</div>`).join('')}
    </div>
  `;

  for (const z of ['all', ...zones]) {
    const zPlans = z==='all' ? plans : plans.filter(p=>(p.zone||'Unassigned')===z);
    const totalQty = zPlans.reduce((s,p)=>s+p.qty,0);
    const dispatched = zPlans.filter(p=>p.status==='dispatched').reduce((s,p)=>s+p.qty,0);
    html += `
      <div class="dispatch-zone-panel ${z!=='all'?'dispatch-zone-panel-zone':''}" data-zone="${z}" ${z!=='all'?'style="display:none"':''}>
        <div class="card mb-4">
          <div class="card-title">${z==='all'?'All Orders':'Zone: '+z} <span class="text-dim text-sm">— ${zPlans.length} orders</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Customer</th><th>Batch No</th><th>PC Code</th><th>Month</th><th>Colour</th>
                <th>Size</th><th>PTD/UP</th><th>Zone</th><th>Qty (L)</th><th>Boxes</th>
                <th>Planned Date</th><th>Actual Dispatched</th><th>Status</th><th>Remarks</th><th>Actions</th>
              </tr></thead>
              <tbody>
                ${zPlans.map(p=>renderDispatchRow(p)).join('')}
                <tr style="background:var(--surface2);font-weight:600">
                  <td colspan="8">TOTAL</td>
                  <td class="text-mono text-accent">${fmt(totalQty)}</td>
                  <td class="text-mono">${zPlans.reduce((s,p)=>s+(p.boxes||0),0)}</td>
                  <td>-</td><td class="text-mono text-green">${fmt(dispatched)}</td>
                  <td colspan="3"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderDispatchRow(p) {
  const isDispatched = p.status==='dispatched';
  const isExportPend = p.exportPending || p.status==='export-pending';
  const ord = state.orders.find(o=>o.id===p.productionOrderId);
  const isReady = !ord || ord.status==='closed';
  const canDispatch = isReady && !isDispatched && !isExportPend;
  const statusBadge = isDispatched
    ? '<span class="badge badge-completed">Dispatched</span>'
    : isExportPend
    ? '<span class="badge" style="background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)">🚢 Awaiting Container</span>'
    : canDispatch
    ? '<span class="badge badge-running">Ready</span>'
    : '<span class="badge badge-pending">Pending</span>';
  const month = p.plannedDate ? new Date(p.plannedDate).toLocaleString('en-IN',{month:'short',year:'2-digit'}) : '—';
  const containerInfo = p.isConsolidatedExport
    ? `<div style="font-size:10px;color:var(--accent5);font-family:var(--mono);margin-top:2px">📦 Container: ${p.containerRef||'—'} (${(p.allProductionOrderIds||[]).length} orders)</div>` : '';
  return `<tr>
    <td style="font-weight:500">${p.customer||'-'}${containerInfo}</td>
    <td class="text-mono">${p.batchNumber||'-'}</td>
    <td class="text-mono text-accent">${p.pcCode||'-'}</td>
    <td class="text-mono text-dim">${month}</td>
    <td style="font-size:12px">${p.colour||'-'}</td>
    <td class="text-mono">${p.size||'-'}</td>
    <td>${p.packing==='PTD'?'<span class="badge badge-ptd">PTD</span>':'<span class="badge badge-up">UP</span>'}</td>
    <td class="text-sm">${p.zone||'-'}</td>
    <td class="text-mono fw-bold">${fmt(p.qty)}</td>
    <td class="text-mono">${p.boxes||'-'}</td>
    <td class="text-mono" style="white-space:nowrap">${p.plannedDate ? fmtDate(p.plannedDate) + (p.tentative ? ' <span style="background:rgba(255,171,0,0.15);color:#ffab00;border:1px solid rgba(255,171,0,0.3);padding:1px 5px;border-radius:3px;font-size:10px;font-family:var(--font-mono)">Tentative</span>' : (p.dateManuallySet ? ' <span style="background:rgba(0,230,118,0.1);color:#00e676;border:1px solid rgba(0,230,118,0.2);padding:1px 5px;border-radius:3px;font-size:10px">Manual</span>' : '')) : '<span style="color:var(--accent5);font-size:11px">Pending container</span>'}</td>
    <td><input type="number" value="${p.actualDispatched||0}" min="0" ${isExportPend?'disabled':''}
      style="width:70px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;font-family:var(--mono)"
      onchange="updateDispatchActual('${p.id}',this.value)"></td>
    <td>${statusBadge}</td>
    <td><input type="text" value="${p.remarks||''}" placeholder="Remarks..."
      style="width:120px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px"
      onchange="updateDispatchRemark('${p.id}',this.value)"></td>
    <td style="white-space:nowrap">
      ${canDispatch?`<button class="btn btn-success btn-sm" onclick="markDispatched('${p.id}')">✓ Dispatch</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="editDispatch('${p.id}')">✏️</button>
    </td>
  </tr>`;
}

function switchDispatchTab(el, zone) {
  document.querySelectorAll('#dispatch-zone-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if (zone==='all') {
    document.querySelectorAll('[data-zone]').forEach(p=>{ if(p.dataset.zone==='all') p.style.display=''; else p.style.display='none'; });
  } else {
    document.querySelectorAll('[data-zone]').forEach(p=>{ p.style.display = p.dataset.zone===zone?'':'none'; });
  }
}

function updateDispatchActual(id, val) {
  const dp = state.dispatchPlans.find(d=>d.id===id);
  if (!dp) return;
  dp.actualDispatched = parseFloat(val)||0;
  if (dp.actualDispatched >= dp.qty) dp.status='dispatched';
  else if (dp.actualDispatched > 0) dp.status='partial';
  // Carry forward if partial
  if (dp.status==='partial') {
    const remaining = dp.qty - dp.actualDispatched;
    const existingCF = state.dispatchPlans.find(d=>d.carryForwardFrom===id);
    if (!existingCF && remaining > 0) {
      state.dispatchPlans.push({...dp, id:uid(), qty:remaining, boxes:Math.ceil(remaining*100000/(state.packSizes[dp.size]||100000)), actualDispatched:0, status:'pending', carryForwardFrom:id, plannedDate:addDays(dp.plannedDate,7)});
    }
  }
  saveState();
}

function markDispatched(id) {
  const dp = state.dispatchPlans.find(d=>d.id===id);
  if (dp) { dp.status='dispatched'; dp.actualDispatched=dp.qty; saveState(); render(); }
}

function updateDispatchRemark(id, val) {
  const dp = state.dispatchPlans.find(d=>d.id===id);
  if (dp) { dp.remarks=val; saveState(); }
}
